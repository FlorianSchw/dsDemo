name: extracting metadata information

on:
  workflow_call:
    outputs:
      output1:
        description: "Boolean to check whether relevant files changed."
        value: ${{ jobs.extract.outputs.file_change }}

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      file_change: ${{ steps.verify-changed-files.outputs.files_changed }}

    steps:

      - name: Checking out repo
        uses: actions/checkout@v6

      - name: Checking out repo with reusable workflow
        uses: actions/checkout@v6
        with:
          repository: FlorianSchw/datashield-workflows
          path: datashield-metadata-workflow

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::tidyverse, any::here, any::jsonlite, any::desc
          needs: check

      - name: Execute Files
        run: |
          source("datashield-metadata-workflow/R/metadata_extraction.R")
        shell: Rscript {0}

      - name: Remove datashield-metadata-workflow folder and files
        run: rm -rf datashield-metadata-workflow

      - name: Verify changes in the data sub-directory
        uses: tj-actions/verify-changed-files@v20.0.4 # v20
        id: verify-changed-files
        with:
          files: "*functions_metadata.json"

      - name: Commit files
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.changed_files }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --local user.name "${GITHUB_ACTOR}"
          git add --all
          git commit -am "updating DataSHIELD function metadata information"
          git push

