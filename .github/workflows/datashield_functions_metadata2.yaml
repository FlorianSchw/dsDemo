name: extracting metadata informtion

on:
  workflow_call:


jobs:
  example_job:
    name: Generate output
    runs-on: ubuntu-latest

    steps:

      - name: Checking out repo
        uses: actions/checkout@v6

      - name: Checking out repo with reusable workflow
        uses: actions/checkout@v6
        with:
          repository: FlorianSchw/dsDemo
          path: datashield-metadata-workflow

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::tidyverse, any::here, any::jsonlite, any::desc
          needs: check

      - name: Execute Files
        run: |
          source("datashield-metadata-workflow/R/metadata_extraction.R")
        shell: Rscript {0}

      - name: Remove datashield-metadata-workflow files
        run: rm -rf datashield-metadata-workflow

      - name: Verify changes in the data sub-directory
        uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20
        id: verify-changed-files
        with:
          files: functions_metadata.json

      - name: Commit files
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.changed_files }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add --all
          git commit -am "updating function metadata information"
          git push
